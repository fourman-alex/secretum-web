<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secretum Web</title>
  <style>
    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --border:  #30363d;
      --text:    #e6edf3;
      --muted:   #8b949e;
      --accent:  #58a6ff;
      --success: #3fb950;
      --danger:  #f85149;
      --mono:    'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container { width: 100%; max-width: 560px; }

    header { margin-bottom: 1.75rem; }

    h1 {
      font-size: 1.375rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.8125rem;
      margin-top: 0.3rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
    }

    .card-title {
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .btn-row { display: flex; gap: 0.5rem; flex-wrap: wrap; }

    button {
      display: inline-flex;
      align-items: center;
      padding: 0.4375rem 0.875rem;
      border-radius: 6px;
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: #21262d;
      color: var(--text);
      transition: background 0.12s, border-color 0.12s;
      line-height: 1.25;
    }

    button:hover:not(:disabled) { background: #30363d; border-color: #8b949e; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #0d1117;
      font-weight: 600;
    }
    button.primary:hover:not(:disabled) { background: #79c0ff; border-color: #79c0ff; }

    .status {
      margin-top: 0.75rem;
      font-size: 0.8125rem;
      color: var(--muted);
      min-height: 1.2em;
    }
    .status.ok  { color: var(--success); }
    .status.err { color: var(--danger);  }

    .passphrase-box {
      margin-top: 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1rem;
      display: none;
    }

    .passphrase-label {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .passphrase-value {
      font-family: var(--mono);
      font-size: 0.875rem;
      word-break: break-all;
      color: var(--success);
      letter-spacing: 0.03em;
    }

    .copy-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.75rem;
    }

    .field {
      margin-bottom: 1rem;
    }

    .field label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 0.375rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    .field input[type="text"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.4375rem 0.75rem;
      font-size: 0.875rem;
      font-family: var(--mono);
      color: var(--text);
      outline: none;
      transition: border-color 0.12s;
    }

    .field input[type="text"]:focus {
      border-color: var(--accent);
    }

    .field input[type="text"]::placeholder {
      color: var(--border);
    }

    .timer {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .banner {
      border-radius: 6px;
      padding: 0.75rem 1rem;
      font-size: 0.8125rem;
      margin-bottom: 1rem;
      display: none;
    }

    .banner.warn {
      background: rgba(210,153,34,0.12);
      border: 1px solid rgba(210,153,34,0.35);
      color: #e3b341;
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <h1>Secretum Web</h1>
    <p class="subtitle">Deterministic passphrase from a FIDO2 hardware key — fully client-side</p>
  </header>

  <div class="banner warn" id="httpsWarning">
    WebAuthn requires HTTPS or localhost. Serve this page over a secure origin.
  </div>

  <!-- Setup card -->
  <div class="card">
    <div class="card-title">Setup</div>

    <div class="btn-row">
      <button class="primary" id="btnSetup">Register key</button>
    </div>
    <div class="status" id="setupStatus"></div>
  </div>

  <!-- Derive card -->
  <div class="card">
    <div class="card-title">Derive passphrase</div>

    <div class="field">
      <label for="entryInput">Entry</label>
      <input type="text" id="entryInput" placeholder="e.g. github.com" autocomplete="off" spellcheck="false" />
    </div>

    <button class="primary" id="btnDerive">Touch your key</button>

    <div class="passphrase-box" id="passphraseBox">
      <div class="passphrase-label">Derived passphrase (hex · 64 chars · auto-clears in <span id="timerSecs">60</span>s)</div>
      <div class="passphrase-value" id="passphraseValue"></div>
      <div class="copy-row">
        <span class="timer" id="timerLabel"></span>
        <button id="btnCopy">Copy</button>
      </div>
    </div>

    <div class="status" id="deriveStatus"></div>
  </div>

</div>

<script type="module" src="app.js"></script>
</body>
</html>
